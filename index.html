<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KAIST Speaking Test">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>카이스트 한국어 말하기 평가</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, orderBy, query }
        from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCuGcGxc1F3XAA6bpUgArVkt5GM5-HAZmk",
      authDomain: "kaist-speaking-test.firebaseapp.com",
      projectId: "kaist-speaking-test",
      storageBucket: "kaist-speaking-test.firebasestorage.app",
      messagingSenderId: "823888317204",
      appId: "1:823888317204:web:e72a8547b8a138d3f49001"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveToFirebase = async function(dataJson) {
      try {
        const data = JSON.parse(dataJson);
        await addDoc(collection(db, 'speaking_results'), data);
        return 'success';
      } catch(e) {
        console.error('Firebase save error:', e);
        return 'error';
      }
    };

    window.loadFromFirebase = async function() {
      try {
        const q = query(
          collection(db, 'speaking_results'),
          orderBy('timestamp', 'desc')
        );
        const snapshot = await getDocs(q);
        const results = [];
        snapshot.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
        return JSON.stringify(results);
      } catch(e) {
        console.error('Firebase load error:', e);
        return '[]';
      }
    };
  </script>

  <script>
    // ── Azure 공통 설정 ───────────────────────────────────
    const AZURE_STT_KEY = '8cLXCDsSXMbr5al4TlsOogqUuHWIGqIWbPsBuY8Mneo9B4ADOxq1JQQJ99CGACNns7RXJ3w3AAAYACOGDy22';
    const AZURE_STT_REGION = 'koreacentral';

    async function loadAzureSDK() {
      if (typeof SpeechSDK !== 'undefined') return;
      return new Promise((resolve) => {
        const script = document.createElement('script');
        script.src = 'https://aka.ms/csspeech/jsbrowserpackageraw';
        script.onload = () => resolve();
        script.onerror = () => resolve();
        document.head.appendChild(script);
      });
    }

    // ── 평가 1용: Azure STT (짧은 인식) ─────────────────
    window.startPronunciationAssessment = async function(referenceText) {
      try {
        await loadAzureSDK();

        if (typeof SpeechSDK === 'undefined') {
          // Azure 실패시 Web Speech API로 대체
          return new Promise((resolve) => {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { resolve(JSON.stringify({text:'',accuracyScore:0,fluencyScore:0,completenessScore:0,pronunciationScore:0})); return; }
            const r = new SR();
            r.lang = 'ko-KR';
            r.interimResults = false;
            r.maxAlternatives = 1;
            r.onresult = (e) => resolve(JSON.stringify({text: e.results[0][0].transcript, accuracyScore:0, fluencyScore:0, completenessScore:0, pronunciationScore:0}));
            r.onerror = () => resolve(JSON.stringify({text:'',accuracyScore:0,fluencyScore:0,completenessScore:0,pronunciationScore:0}));
            r.start();
          });
        }

        return new Promise((resolve) => {
          const speechConfig = SpeechSDK.SpeechConfig
              .fromSubscription(AZURE_STT_KEY, AZURE_STT_REGION);
          speechConfig.speechRecognitionLanguage = 'ko-KR';

          const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
          const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

          recognizer.recognizeOnceAsync((result) => {
            if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
              resolve(JSON.stringify({
                text: result.text,
                accuracyScore: 0, fluencyScore: 0,
                completenessScore: 0, pronunciationScore: 0,
              }));
            } else {
              resolve(JSON.stringify({text:'',accuracyScore:0,fluencyScore:0,completenessScore:0,pronunciationScore:0}));
            }
            recognizer.close();
          });
        });

      } catch(e) {
        console.error('Azure STT 오류:', e);
        return JSON.stringify({text:'',accuracyScore:0,fluencyScore:0,completenessScore:0,pronunciationScore:0});
      }
    };

    let recognition = null;
    window.startSpeechRecognition = function(lang) {
      return new Promise((resolve) => {
        if (!('webkitSpeechRecognition' in window) &&
            !('SpeechRecognition' in window)) {
          resolve(''); return;
        }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = lang || 'ko-KR';
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;
        recognition.onresult = (e) => resolve(e.results[0][0].transcript);
        recognition.onerror = () => resolve('');
        recognition.onend = () => {};
        recognition.start();
      });
    };

    window.stopSpeechRecognition = function() {
      if (recognition) recognition.stop();
    };

    // ── 평가 2,3,4용: Azure STT 연속 인식 ────────────────

    window._azureRecognizer = null;
    window._azureFullText = '';

    window.startLongSpeechRecognition = async function(lang) {
      try {
        await loadAzureSDK();

        if (typeof SpeechSDK === 'undefined') {
          console.error('Azure SDK 로드 실패, Web Speech API로 대체');
          return;
        }

        window._azureFullText = '';

        const speechConfig = SpeechSDK.SpeechConfig
            .fromSubscription(AZURE_STT_KEY, AZURE_STT_REGION);
        speechConfig.speechRecognitionLanguage = lang || 'ko-KR';

        const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
        const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

        // 인식된 문장마다 누적
        recognizer.recognized = (s, e) => {
          if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
            window._azureFullText += e.result.text + ' ';
            console.log('인식됨:', e.result.text);
          }
        };

        recognizer.canceled = (s, e) => {
          console.log('Azure STT 취소:', e.errorDetails);
        };

        recognizer.startContinuousRecognitionAsync(
          () => console.log('Azure STT 시작'),
          (err) => console.error('Azure STT 시작 오류:', err)
        );

        window._azureRecognizer = recognizer;

      } catch(e) {
        console.error('Azure STT 오류:', e);
      }
    };

    window.stopLongSpeechRecognitionSync = function() {
      const text = (window._azureFullText || '').trim();
      window._azureFullText = '';

      if (window._azureRecognizer) {
        try {
          window._azureRecognizer.stopContinuousRecognitionAsync(
            () => {
              window._azureRecognizer.close();
              window._azureRecognizer = null;
            },
            (err) => {
              console.error('Azure STT 중지 오류:', err);
              window._azureRecognizer = null;
            }
          );
        } catch(e) {
          window._azureRecognizer = null;
        }
      }

      return text;
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
